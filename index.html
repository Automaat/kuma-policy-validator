<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kuma Resource Validator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/codemirror@5.65.18/lib/codemirror.min.css">
<script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.18/lib/codemirror.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.18/mode/yaml/yaml.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: #ffffff;
  color: #000000;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ── Header ── */
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 20px 32px;
  border-bottom: 3px solid #000;
}

header h1 {
  font-size: 26px;
  font-weight: 900;
  letter-spacing: -0.03em;
  text-transform: uppercase;
}

.header-actions {
  display: flex;
  align-items: center;
  gap: 10px;
}

select {
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  font-weight: 600;
  padding: 10px 16px;
  border: 2px solid #000;
  border-radius: 0;
  background: #fff;
  color: #000;
  cursor: pointer;
  appearance: none;
  -webkit-appearance: none;
  padding-right: 32px;
  background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='black' stroke-width='2' stroke-linecap='round'/%3E%3C/svg%3E");
  background-repeat: no-repeat;
  background-position: right 12px center;
  text-transform: uppercase;
  letter-spacing: 0.02em;
}

select:hover { background-color: #f5f5f5; }
select:focus { outline: 2px solid #000; outline-offset: -2px; }

/* ── Main layout ── */
.main {
  display: flex;
  height: calc(100vh - 68px);
}

.editor-pane, .results-pane {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.editor-pane { border-right: 3px solid #000; }

.pane-header {
  padding: 12px 20px;
  font-size: 13px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: #999;
  border-bottom: 1px solid #e5e5e5;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

/* ── CodeMirror Editor ── */
.editor-wrap { flex: 1; overflow: hidden; }

.editor-wrap .CodeMirror {
  height: 100%;
  font-family: 'JetBrains Mono', monospace;
  font-size: 15px;
  line-height: 1.7;
  background: #fafafa;
  border: none;
}

.CodeMirror-focused { background: #fff; }
.CodeMirror-gutters { background: #f0f0f0; border-right: 1px solid #e5e5e5; }
.CodeMirror-linenumber { color: #bbb; font-size: 12px; }
.CodeMirror-cursor { border-left-color: #000; }
.CodeMirror-selected { background: #d7e4fc; }

/* YAML syntax colors */
.cm-s-default .cm-atom { color: #0550ae; }
.cm-s-default .cm-number { color: #0550ae; }
.cm-s-default .cm-string { color: #0a3069; }
.cm-s-default .cm-meta { color: #6f42c1; }
.cm-s-default .cm-keyword { color: #cf222e; }
.cm-s-default .cm-variable-2 { color: #953800; }

/* ── Results ── */
.results {
  flex: 1;
  overflow-y: auto;
  padding: 24px;
}

.result-section { margin-bottom: 24px; }

.result-section h3 {
  font-size: 13px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-bottom: 12px;
  padding-bottom: 8px;
  border-bottom: 2px solid #000;
}

.result-section h3.errors { border-color: #e57373; color: #c62828; }
.result-section h3.warnings { border-color: #ffb74d; color: #e65100; }
.result-section h3.info { border-color: #90caf9; color: #1565c0; }
.result-section h3.valid { border-color: #81c784; color: #2e7d32; }

.result-item {
  padding: 14px 18px;
  margin-bottom: 8px;
  font-size: 15px;
  font-weight: 500;
  line-height: 1.5;
  display: flex;
  gap: 12px;
  align-items: flex-start;
  border: 2px solid transparent;
  border-radius: 8px;
}

.result-item .icon {
  flex-shrink: 0;
  width: 22px;
  height: 22px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 800;
  border-radius: 50%;
}

.result-item.error {
  background: #ffebee;
  border-color: #ef9a9a;
  color: #c62828;
}

.result-item.error .icon {
  background: #e57373;
  color: #fff;
}

.result-item.error .path { color: #e57373; }

.result-item.warning {
  background: #fff8e1;
  border-color: #ffe082;
  color: #e65100;
}

.result-item.warning .icon {
  background: #ffb74d;
  color: #fff;
}

.result-item.warning .path { color: #ffb74d; }

.result-item.success {
  background: #e8f5e9;
  border-color: #a5d6a7;
  color: #2e7d32;
}

.result-item.success .icon {
  background: #81c784;
  color: #fff;
}

.result-item.success .path { color: #81c784; }

.result-item.info {
  background: #e3f2fd;
  border-color: #90caf9;
  color: #1565c0;
}

.result-item.info .icon {
  background: #90caf9;
  color: #fff;
}

.result-item.info .path { color: #90caf9; }

.result-item .msg { flex: 1; }

.result-item .path {
  color: #999;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  font-weight: 400;
  display: block;
  margin-top: 4px;
}

/* ── Badge ── */
.badge {
  font-size: 10px;
  font-weight: 800;
  padding: 3px 8px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  border: 2px solid #000;
}

/* ── Empty state ── */
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  text-align: center;
  gap: 4px;
}

.empty-state .arrow {
  font-size: 48px;
  font-weight: 900;
  color: #e5e5e5;
  margin-bottom: 12px;
}

.empty-state p { font-size: 16px; font-weight: 600; color: #bbb; }
.empty-state p.sub { font-size: 14px; font-weight: 500; }

/* ── Responsive ── */
@media (max-width: 768px) {
  .main { flex-direction: column; height: auto; min-height: calc(100vh - 68px); }
  .editor-pane { border-right: none; border-bottom: 3px solid #000; min-height: 40vh; }
  .results-pane { min-height: 40vh; }
  header { flex-wrap: wrap; gap: 8px; padding: 16px 20px; }
  .results { padding: 16px; }
}
</style>
</head>
<body>

<header>
  <h1>Kuma Resource Validator</h1>
  <div class="header-actions">
    <select id="examples">
      <option value="">Load Example</option>
      <optgroup label="Policies">
        <option value="valid-k8s">Valid MeshTimeout (K8s)</option>
        <option value="valid-uni">Valid MeshTrafficPermission (Uni)</option>
        <option value="deprecated">Deprecated from field</option>
        <option value="invalid-policy">Invalid Policy</option>
      </optgroup>
      <optgroup label="Core Resources">
        <option value="meshservice">MeshService</option>
        <option value="meshexternalservice">MeshExternalService</option>
        <option value="meshmultizoneservice">MeshMultiZoneService</option>
        <option value="dataplane">Dataplane</option>
        <option value="invalid-meshext">Invalid MeshExternalService</option>
        <option value="invalid-dataplane">Invalid Dataplane</option>
        <option value="invalid-mzs">Invalid MeshMultiZoneService</option>
        <option value="invalid-meshsvc">Invalid MeshService</option>
      </optgroup>
    </select>
  </div>
</header>

<div class="main">
  <div class="editor-pane">
    <div class="pane-header">
      <span>YAML Input</span>
      <span id="formatBadge"></span>
    </div>
    <div class="editor-wrap"><textarea id="editor"></textarea></div>
  </div>
  <div class="results-pane">
    <div class="pane-header">Results</div>
    <div class="results" id="results">
      <div class="empty-state">
        <div class="arrow">&larr;</div>
        <p>Paste a Kuma resource YAML</p>
        <p class="sub">policies, MeshService, Dataplane, and more</p>
      </div>
    </div>
  </div>
</div>

<script>
const EXAMPLES = {
  'valid-k8s': `apiVersion: kuma.io/v1alpha1
kind: MeshTimeout
metadata:
  name: timeout-global
  namespace: kuma-system
  labels:
    kuma.io/mesh: default
spec:
  targetRef:
    kind: Mesh
  to:
    - targetRef:
        kind: Mesh
      default:
        connectionTimeout: 5s
        idleTimeout: 30s
        http:
          requestTimeout: 15s
          streamIdleTimeout: 60s`,

  'valid-uni': `type: MeshTrafficPermission
name: allow-all
mesh: default
spec:
  targetRef:
    kind: Mesh
  rules:
    - default:
        action: Allow`,

  'deprecated': `apiVersion: kuma.io/v1alpha1
kind: MeshTimeout
metadata:
  name: timeout-deprecated
  namespace: kuma-system
  labels:
    kuma.io/mesh: default
spec:
  targetRef:
    kind: MeshService
    name: backend
  from:
    - targetRef:
        kind: Mesh
      default:
        connectionTimeout: 5s`,

  'invalid-policy': `apiVersion: kuma.io/v1alpha1
kind: MeshTimeout
metadata:
  name: invalid-timeout
  namespace: kuma-system
spec:
  targetRef:
    kind: Mesh`,

  'meshservice': `apiVersion: kuma.io/v1alpha1
kind: MeshService
metadata:
  name: backend
  namespace: kuma-demo
  labels:
    kuma.io/mesh: default
spec:
  selector:
    dataplaneTags:
      app: backend
  ports:
    - port: 80
      targetPort: 8080
      appProtocol: http`,

  'meshexternalservice': `apiVersion: kuma.io/v1alpha1
kind: MeshExternalService
metadata:
  name: external-api
  namespace: kuma-system
  labels:
    kuma.io/mesh: default
spec:
  match:
    type: HostnameGenerator
    port: 443
    protocol: tcp
  endpoints:
    - address: api.example.com
      port: 443
  tls:
    enabled: true
    verification:
      mode: Secured
      serverName: api.example.com`,

  'meshmultizoneservice': `apiVersion: kuma.io/v1alpha1
kind: MeshMultiZoneService
metadata:
  name: backend-global
  namespace: kuma-system
  labels:
    kuma.io/mesh: default
spec:
  selector:
    meshService:
      matchLabels:
        app: backend
  ports:
    - port: 80
      appProtocol: http`,

  'dataplane': `type: Dataplane
name: backend-01
mesh: default
networking:
  address: 192.168.0.1
  inbound:
    - port: 8080
      servicePort: 80
      tags:
        kuma.io/service: backend
        kuma.io/protocol: http`,

  'invalid-meshext': `apiVersion: kuma.io/v1alpha1
kind: MeshExternalService
metadata:
  name: bad-external
  namespace: kuma-system
  labels:
    kuma.io/mesh: default
spec:
  match:
    port: 0
    protocol: websocket
  endpoints:
    - address: "not a valid address!"
      port: 99999`,

  'invalid-dataplane': `type: Dataplane
name: broken-dp
mesh: default
networking:
  address: 0.0.0.0
  inbound:
    - port: 70000
      tags:
        app: backend
  outbound:
    - port: 8080
      tags:
        app: redis
      backendRef:
        kind: MeshService
        name: redis`,

  'invalid-mzs': `apiVersion: kuma.io/v1alpha1
kind: MeshMultiZoneService
metadata:
  name: bad-mzs
  namespace: kuma-system
  labels:
    kuma.io/mesh: default
spec:
  selector:
    meshService:
      matchLabels: {}
  ports: []`,

  'invalid-meshsvc': `apiVersion: kuma.io/v1alpha1
kind: MeshService
metadata:
  name: this-name-is-way-too-long-and-exceeds-the-sixty-three-character-limit-for-mesh-services
  namespace: kuma-demo
  labels:
    kuma.io/mesh: default
spec:
  selector:
    dataplaneTags:
      app: backend
    dataplaneLabels:
      env: prod
  ports:
    - port: 0
      appProtocol: websocket`
};

// ── Known resource types ──

const KNOWN_POLICIES = [
  'MeshAccessLog', 'MeshCircuitBreaker', 'MeshFaultInjection',
  'MeshHealthCheck', 'MeshHTTPRoute', 'MeshLoadBalancingStrategy',
  'MeshMetric', 'MeshPassthrough', 'MeshProxyPatch', 'MeshRateLimit',
  'MeshRetry', 'MeshTCPRoute', 'MeshTimeout', 'MeshTLS', 'MeshTrace',
  'MeshTrafficPermission'
];

const KNOWN_CORE_RESOURCES = [
  'Mesh', 'Dataplane', 'ExternalService', 'ZoneIngress', 'ZoneEgress',
  'MeshService', 'MeshMultiZoneService', 'MeshExternalService', 'MeshGateway'
];

const ALL_KNOWN = [...KNOWN_POLICIES, ...KNOWN_CORE_RESOURCES];

// ── Policy constants ──

// Per-policy structural requirements (from zz_generated.resource.go)
const POLICY_STRUCTURE = {
  MeshAccessLog:            { to: true,  from: true,  rules: true  },
  MeshCircuitBreaker:       { to: true,  from: true,  rules: true  },
  MeshFaultInjection:       { to: true,  from: true,  rules: true  },
  MeshHealthCheck:          { to: true,  from: false, rules: false },
  MeshHTTPRoute:            { to: true,  from: false, rules: false },
  MeshLoadBalancingStrategy:{ to: true,  from: false, rules: false },
  MeshMetric:               { to: false, from: false, rules: false, default: true },
  MeshPassthrough:          { to: false, from: false, rules: false, default: true },
  MeshProxyPatch:           { to: false, from: false, rules: false, default: true },
  MeshRateLimit:            { to: true,  from: true,  rules: true  },
  MeshRetry:                { to: true,  from: false, rules: false },
  MeshTCPRoute:             { to: true,  from: false, rules: false },
  MeshTimeout:              { to: true,  from: true,  rules: true  },
  MeshTLS:                  { to: false, from: true,  rules: true  },
  MeshTrace:                { to: false, from: false, rules: false, default: true },
  MeshTrafficPermission:    { to: false, from: true,  rules: true  },
};

const FROM_DEPRECATED_USE_RULES = ['MeshAccessLog', 'MeshCircuitBreaker', 'MeshRateLimit', 'MeshTimeout', 'MeshTLS'];
const FROM_DEPRECATED_USE_RULES_MATCHES = ['MeshTrafficPermission', 'MeshFaultInjection'];

const TARGETREF_KINDS = [
  'Mesh', 'Dataplane', 'MeshSubset', 'MeshService', 'MeshServiceSubset',
  'MeshGateway', 'MeshHTTPRoute', 'MeshExternalService', 'MeshMultiZoneService'
];

const DEPRECATED_TOP_TARGETREF = [
  'MeshService', 'MeshServiceSubset', 'MeshSubset', 'MeshGateway',
  'MeshHTTPRoute', 'MeshExternalService', 'MeshMultiZoneService'
];

// ── Core resource constants ──

const VALID_PROTOCOLS = ['tcp', 'grpc', 'http', 'http2', 'kafka'];
const MESH_EXT_PROTOCOLS = ['tcp', 'grpc', 'http', 'http2'];
const TLS_VERIFICATION_MODES = ['SkipSAN', 'SkipCA', 'SkipAll', 'Secured'];
const SAN_MATCH_TYPES = ['Prefix', 'Exact'];

// ── Helpers ──

function isValidPort(p) { return typeof p === 'number' && p >= 1 && p <= 65535; }

function isValidIP(s) {
  if (!s) return false;
  // IPv4
  if (/^(\d{1,3}\.){3}\d{1,3}$/.test(s)) return s.split('.').every(o => +o >= 0 && +o <= 255);
  // IPv6 (simplified)
  if (s.includes(':')) return /^[0-9a-fA-F:]+$/.test(s);
  return false;
}

function isValidDNS(s) {
  if (!s) return false;
  return /^[a-zA-Z0-9]([a-zA-Z0-9\-\.]*[a-zA-Z0-9])?$/.test(s) && s.length <= 253;
}

function isValidAddress(s) { return isValidIP(s) || isValidDNS(s); }

// ── Main validate function ──

function validate(yamlStr) {
  const errors = [];
  const warnings = [];
  const infos = [];

  if (!yamlStr.trim()) return { errors, warnings, infos };

  let doc;
  try {
    doc = jsyaml.load(yamlStr);
  } catch (e) {
    const line = e.mark ? e.mark.line + 1 : '?';
    errors.push({ msg: `YAML syntax error: ${e.reason || e.message}`, path: `line ${line}` });
    return { errors, warnings, infos };
  }

  if (!doc || typeof doc !== 'object') {
    errors.push({ msg: 'Document must be a YAML mapping', path: 'root' });
    return { errors, warnings, infos };
  }

  // Detect format
  const isK8s = doc.apiVersion && doc.kind && doc.metadata;
  const isUni = doc.type && doc.name && !doc.apiVersion;
  let format = null;
  let kind = null;

  if (isK8s) {
    format = 'k8s';
    kind = doc.kind;
    infos.push({ msg: 'Kubernetes format detected', path: 'apiVersion, kind, metadata' });
  } else if (isUni) {
    format = 'uni';
    kind = doc.type;
    infos.push({ msg: 'Universal format detected', path: 'type, name' });
  } else {
    errors.push({ msg: 'Unknown format: expected Kubernetes (apiVersion+kind+metadata) or Universal (type+name)', path: 'root' });
    return { errors, warnings, infos };
  }

  if (format === 'k8s' && doc.apiVersion !== 'kuma.io/v1alpha1') {
    errors.push({ msg: `Invalid apiVersion: "${doc.apiVersion}", expected "kuma.io/v1alpha1"`, path: 'apiVersion' });
  }

  if (!ALL_KNOWN.includes(kind)) {
    errors.push({ msg: `Unknown resource kind: "${kind}"`, path: format === 'k8s' ? 'kind' : 'type' });
    return { errors, warnings, infos };
  }

  const isPolicy = KNOWN_POLICIES.includes(kind);
  const category = isPolicy ? 'Policy' : 'Core Resource';
  infos.push({ msg: `${category}: ${kind}`, path: format === 'k8s' ? 'kind' : 'type' });

  // Route to the right validator
  if (isPolicy) {
    validatePolicy(kind, doc, format, errors, warnings, infos);
  } else {
    validateCoreResource(kind, doc, format, errors, warnings, infos);
  }

  if (errors.length === 0) infos.push({ msg: 'Resource structure is valid', path: '' });

  return { errors, warnings, infos, format };
}

// ── Policy validation ──

function validatePolicy(kind, doc, format, errors, warnings, infos) {
  const spec = doc.spec;
  if (!spec || typeof spec !== 'object') {
    errors.push({ msg: 'Missing or invalid spec', path: 'spec' });
    return;
  }

  // Require targetRef
  if (!spec.targetRef) {
    errors.push({ msg: 'spec.targetRef is required', path: 'spec.targetRef' });
  }

  const hasTo = Array.isArray(spec.to) && spec.to.length > 0;
  const hasFrom = Array.isArray(spec.from) && spec.from.length > 0;
  const hasRules = Array.isArray(spec.rules) && spec.rules.length > 0;
  const hasDefault = spec.default && typeof spec.default === 'object';

  const ps = POLICY_STRUCTURE[kind];
  if (ps) {
    // Check for unknown top-level spec fields
    const knownFields = ['targetRef'];
    if (ps.to) knownFields.push('to');
    if (ps.from) knownFields.push('from');
    if (ps.rules) knownFields.push('rules');
    if (ps.default) knownFields.push('default');
    const specKeys = Object.keys(spec);
    specKeys.forEach(k => {
      if (!knownFields.includes(k))
        warnings.push({ msg: `Unknown field "${k}" in spec for ${kind}`, path: `spec.${k}` });
    });

    // Require at least one applicable section
    const allowed = [];
    if (ps.to) allowed.push('"to"');
    if (ps.from) allowed.push('"from"');
    if (ps.rules) allowed.push('"rules"');
    if (ps.default) allowed.push('"default"');

    const hasAny = (ps.to && hasTo) || (ps.from && hasFrom) || (ps.rules && hasRules) || (ps.default && hasDefault);
    if (!hasAny) {
      errors.push({ msg: `${kind} requires at least one of: ${allowed.join(', ')}`, path: 'spec' });
    }

    // Warn on fields not supported by this policy
    if (!ps.to && hasTo) warnings.push({ msg: `${kind} does not use "to"`, path: 'spec.to' });
    if (!ps.from && hasFrom) warnings.push({ msg: `${kind} does not use "from"`, path: 'spec.from' });
    if (!ps.rules && hasRules) warnings.push({ msg: `${kind} does not use "rules"`, path: 'spec.rules' });
    if (!ps.default && hasDefault) warnings.push({ msg: `${kind} does not use "default" at spec level`, path: 'spec.default' });

    // from+rules mutual exclusivity (for policies that have both)
    if (ps.from && ps.rules && hasFrom && hasRules) {
      errors.push({ msg: '"from" and "rules" are mutually exclusive', path: 'spec' });
    }
  }

  function validateTargetRef(tr, path) {
    if (!tr || typeof tr !== 'object') return;
    const k = tr.kind;
    if (!k) { errors.push({ msg: 'targetRef missing "kind"', path }); return; }
    if (!TARGETREF_KINDS.includes(k)) { errors.push({ msg: `Unknown targetRef kind: "${k}"`, path: `${path}.kind` }); return; }
    switch (k) {
      case 'Mesh':
        if (tr.name || tr.labels || tr.tags) warnings.push({ msg: 'Mesh targetRef should not have name, labels, or tags', path });
        break;
      case 'Dataplane':
        if (tr.labels && (tr.name || tr.namespace)) errors.push({ msg: 'Dataplane: labels and name/namespace are mutually exclusive', path });
        break;
      case 'MeshSubset':
        if (!tr.tags || Object.keys(tr.tags).length === 0) errors.push({ msg: 'MeshSubset requires "tags"', path });
        break;
      case 'MeshService':
        if (!tr.name && (!tr.labels || Object.keys(tr.labels).length === 0)) errors.push({ msg: 'MeshService requires "name" or "labels"', path });
        break;
      case 'MeshServiceSubset':
        if (!tr.name) errors.push({ msg: 'MeshServiceSubset requires "name"', path });
        if (!tr.tags || Object.keys(tr.tags).length === 0) errors.push({ msg: 'MeshServiceSubset requires "tags"', path });
        break;
      case 'MeshGateway':
        if (!tr.name && (!tr.labels || Object.keys(tr.labels).length === 0)) errors.push({ msg: 'MeshGateway requires "name" or "labels"', path });
        break;
      case 'MeshHTTPRoute': case 'MeshExternalService': case 'MeshMultiZoneService':
        if (!tr.name && (!tr.labels || Object.keys(tr.labels).length === 0)) errors.push({ msg: `${k} requires "name" or "labels"`, path });
        break;
    }
  }

  if (spec.targetRef) validateTargetRef(spec.targetRef, 'spec.targetRef');
  if (hasTo) spec.to.forEach((item, i) => { if (item.targetRef) validateTargetRef(item.targetRef, `spec.to[${i}].targetRef`); });
  if (hasFrom) spec.from.forEach((item, i) => { if (item.targetRef) validateTargetRef(item.targetRef, `spec.from[${i}].targetRef`); });
  if (hasRules) spec.rules.forEach((rule, i) => {
    if (Array.isArray(rule.matches)) rule.matches.forEach((match, j) => {
      if (match.targetRef) validateTargetRef(match.targetRef, `spec.rules[${i}].matches[${j}].targetRef`);
    });
  });

  // Deprecation checks
  if (spec.targetRef && DEPRECATED_TOP_TARGETREF.includes(spec.targetRef.kind))
    warnings.push({ msg: `Top-level targetRef kind "${spec.targetRef.kind}" is deprecated \u2014 use "Mesh" or "Dataplane"`, path: 'spec.targetRef.kind' });
  if (hasFrom && FROM_DEPRECATED_USE_RULES.includes(kind))
    warnings.push({ msg: `"from" in ${kind} is deprecated \u2014 use "rules"`, path: 'spec.from' });
  if (hasFrom && FROM_DEPRECATED_USE_RULES_MATCHES.includes(kind))
    warnings.push({ msg: `"from" in ${kind} is deprecated \u2014 use "rules" with "matches"`, path: 'spec.from' });

  if (kind === 'MeshHealthCheck') {
    const checkPanic = (obj, p) => {
      if (obj && obj.healthyPanicThreshold !== undefined)
        warnings.push({ msg: '"healthyPanicThreshold" deprecated \u2014 moved to MeshCircuitBreaker', path: p });
    };
    if (hasTo) spec.to.forEach((item, i) => checkPanic(item.default, `spec.to[${i}].default`));
    if (hasFrom) spec.from.forEach((item, i) => checkPanic(item.default, `spec.from[${i}].default`));
  }

  if (kind === 'MeshLoadBalancingStrategy') {
    const checkLbs = (conf, p) => {
      if (!conf) return;
      const lbType = conf.loadBalancer?.type;
      if (lbType === 'RingHash' || lbType === 'Maglev') {
        const inner = conf.loadBalancer?.[lbType === 'RingHash' ? 'ringHash' : 'maglev'];
        if (inner?.hashPolicies) {
          warnings.push({ msg: `"hashPolicies" inside ${lbType} is deprecated \u2014 use top-level`, path: `${p}.loadBalancer.${lbType.toLowerCase()}.hashPolicies` });
          inner.hashPolicies.forEach((hp, j) => {
            if (hp.type === 'SourceIP') warnings.push({ msg: '"SourceIP" deprecated \u2014 use "Connection"', path: `${p}.loadBalancer.${lbType.toLowerCase()}.hashPolicies[${j}].type` });
          });
        }
      }
      if (Array.isArray(conf.hashPolicies)) {
        conf.hashPolicies.forEach((hp, j) => {
          if (hp.type === 'SourceIP') warnings.push({ msg: '"SourceIP" deprecated \u2014 use "Connection"', path: `${p}.hashPolicies[${j}].type` });
        });
      }
    };
    if (hasTo) spec.to.forEach((item, i) => checkLbs(item.default, `spec.to[${i}].default`));
  }

  if (kind === 'MeshRateLimit') {
    const checkStatus = (conf, p) => {
      if (!conf) return;
      const status = conf.http?.onRateLimit?.status;
      if (status !== undefined && status < 400)
        warnings.push({ msg: `HTTP onRateLimit status ${status} < 400 is deprecated`, path: `${p}.http.onRateLimit.status` });
    };
    if (hasTo) spec.to.forEach((item, i) => checkStatus(item.default, `spec.to[${i}].default`));
    if (hasFrom) spec.from.forEach((item, i) => checkStatus(item.default, `spec.from[${i}].default`));
  }
}

// ── Core resource validation ──

function validateCoreResource(kind, doc, format, errors, warnings, infos) {
  switch (kind) {
    case 'MeshService': return validateMeshService(doc, format, errors, warnings);
    case 'MeshMultiZoneService': return validateMeshMultiZoneService(doc, format, errors, warnings);
    case 'MeshExternalService': return validateMeshExternalService(doc, format, errors, warnings);
    case 'Dataplane': return validateDataplane(doc, format, errors, warnings);
    case 'ExternalService': return validateExternalService(doc, format, errors, warnings);
    case 'ZoneIngress': return validateZoneIngress(doc, format, errors, warnings);
    case 'ZoneEgress': return validateZoneEgress(doc, format, errors, warnings);
    case 'Mesh': return validateMesh(doc, format, errors, warnings);
    case 'MeshGateway': return validateMeshGatewayResource(doc, format, errors, warnings);
  }
}

function validateMeshService(doc, format, errors, warnings) {
  const name = format === 'k8s' ? doc.metadata?.name : doc.name;
  if (name && name.length > 63) errors.push({ msg: `Name too long: ${name.length} chars (max 63)`, path: 'name' });

  const spec = doc.spec;
  if (!spec) { errors.push({ msg: 'Missing spec', path: 'spec' }); return; }

  const sel = spec.selector;
  if (sel) {
    const setCount = [sel.dataplaneTags, sel.dataplaneRef, sel.dataplaneLabels].filter(Boolean).length;
    if (setCount > 1)
      errors.push({ msg: 'Selector: specify only one of dataplaneTags, dataplaneRef, or dataplaneLabels', path: 'spec.selector' });
  }

  if (Array.isArray(spec.ports)) {
    spec.ports.forEach((p, i) => {
      if (p.port !== undefined && !isValidPort(p.port))
        errors.push({ msg: `Port must be 1-65535, got ${p.port}`, path: `spec.ports[${i}].port` });
      if (p.targetPort !== undefined && !isValidPort(p.targetPort))
        errors.push({ msg: `Target port must be 1-65535, got ${p.targetPort}`, path: `spec.ports[${i}].targetPort` });
      if (p.appProtocol && !VALID_PROTOCOLS.includes(p.appProtocol))
        errors.push({ msg: `appProtocol must be one of: ${VALID_PROTOCOLS.join(', ')}`, path: `spec.ports[${i}].appProtocol` });
    });
  }
}

function validateMeshMultiZoneService(doc, format, errors, warnings) {
  const spec = doc.spec;
  if (!spec) { errors.push({ msg: 'Missing spec', path: 'spec' }); return; }

  const labels = spec.selector?.meshService?.matchLabels;
  if (!labels || Object.keys(labels).length === 0)
    errors.push({ msg: 'selector.meshService.matchLabels cannot be empty', path: 'spec.selector.meshService.matchLabels' });

  if (!Array.isArray(spec.ports) || spec.ports.length === 0)
    errors.push({ msg: 'ports cannot be empty', path: 'spec.ports' });

  if (Array.isArray(spec.ports)) {
    spec.ports.forEach((p, i) => {
      if (p.name !== undefined && p.name === '')
        errors.push({ msg: 'Port name must not be empty', path: `spec.ports[${i}].name` });
      if (p.appProtocol && !VALID_PROTOCOLS.includes(p.appProtocol))
        errors.push({ msg: `appProtocol must be one of: ${VALID_PROTOCOLS.join(', ')}`, path: `spec.ports[${i}].appProtocol` });
    });
  }
}

function validateMeshExternalService(doc, format, errors, warnings) {
  const name = format === 'k8s' ? doc.metadata?.name : doc.name;
  if (name && name.length > 63) errors.push({ msg: `Name too long: ${name.length} chars (max 63)`, path: 'name' });

  const spec = doc.spec;
  if (!spec) { errors.push({ msg: 'Missing spec', path: 'spec' }); return; }

  // Match
  const match = spec.match;
  if (match) {
    if (match.type && match.type !== 'HostnameGenerator')
      errors.push({ msg: `Unrecognized match type "${match.type}" \u2014 only "HostnameGenerator" is supported`, path: 'spec.match.type' });
    if (!isValidPort(match.port))
      errors.push({ msg: `Port must be 1-65535, got ${match.port || 0}`, path: 'spec.match.port' });
    if (!MESH_EXT_PROTOCOLS.includes(match.protocol))
      errors.push({ msg: `Protocol must be one of: ${MESH_EXT_PROTOCOLS.join(', ')}`, path: 'spec.match.protocol' });
  } else {
    errors.push({ msg: 'Missing match', path: 'spec.match' });
  }

  // Endpoints
  if (spec.extension == null && Array.isArray(spec.endpoints)) {
    spec.endpoints.forEach((ep, i) => {
      if (!isValidIP(ep.address) && !isValidDNS(ep.address))
        errors.push({ msg: 'Address must be a valid IP or hostname', path: `spec.endpoints[${i}].address` });
      if (ep.port !== undefined && !isValidPort(ep.port))
        errors.push({ msg: `Port must be 1-65535, got ${ep.port}`, path: `spec.endpoints[${i}].port` });
    });
  }

  // TLS
  if (spec.extension == null && spec.tls?.verification) {
    const v = spec.tls.verification;
    if (v.mode && !TLS_VERIFICATION_MODES.includes(v.mode))
      errors.push({ msg: `TLS verification mode must be one of: ${TLS_VERIFICATION_MODES.join(', ')}`, path: 'spec.tls.verification.mode' });
    if (v.serverName && !isValidDNS(v.serverName))
      errors.push({ msg: 'serverName must be a valid DNS name', path: 'spec.tls.verification.serverName' });
    if (Array.isArray(v.subjectAltNames)) {
      v.subjectAltNames.forEach((san, i) => {
        if (san.type && !SAN_MATCH_TYPES.includes(san.type))
          errors.push({ msg: `SAN type must be one of: ${SAN_MATCH_TYPES.join(', ')}`, path: `spec.tls.verification.subjectAltNames[${i}].type` });
      });
    }
    if (v.clientCert && !v.clientKey)
      errors.push({ msg: 'clientKey must be defined when clientCert is defined', path: 'spec.tls.verification.clientKey' });
    if (!v.clientCert && v.clientKey)
      errors.push({ msg: 'clientCert must be defined when clientKey is defined', path: 'spec.tls.verification.clientCert' });
  }

  // Extension
  if (spec.extension && !spec.extension.type)
    errors.push({ msg: 'Extension type must not be empty', path: 'spec.extension.type' });
}

function validateDataplane(doc, format, errors, warnings) {
  // Universal format uses top-level networking, K8s uses spec.networking
  const net = format === 'uni' ? doc.networking : doc.spec?.networking;
  const root = format === 'uni' ? 'networking' : 'spec.networking';

  if (!net) { errors.push({ msg: 'Missing networking', path: root }); return; }

  if (!net.address) {
    errors.push({ msg: 'networking.address is required', path: `${root}.address` });
  } else if (net.address === '0.0.0.0' || net.address === '::') {
    errors.push({ msg: `Address cannot be ${net.address}`, path: `${root}.address` });
  } else if (!isValidAddress(net.address)) {
    errors.push({ msg: 'Address must be a valid IP or hostname', path: `${root}.address` });
  }

  // Gateway mode
  if (net.gateway) {
    const gw = net.gateway;
    if (gw.type === 'DELEGATED' && Array.isArray(net.inbound) && net.inbound.length > 0)
      errors.push({ msg: 'Delegated gateway cannot have inbound interfaces', path: `${root}.inbound` });
    if (gw.type === 'BUILTIN') {
      if (Array.isArray(net.inbound) && net.inbound.length > 0)
        errors.push({ msg: 'Builtin gateway cannot have inbound interfaces', path: `${root}.inbound` });
      if (Array.isArray(net.outbound) && net.outbound.length > 0)
        errors.push({ msg: 'Builtin gateway cannot have outbound interfaces', path: `${root}.outbound` });
    }
    if (gw.tags && !gw.tags['kuma.io/service'])
      errors.push({ msg: 'Gateway tags must include "kuma.io/service"', path: `${root}.gateway.tags` });
    return;
  }

  // Inbound
  if (Array.isArray(net.inbound)) {
    net.inbound.forEach((ib, i) => {
      if (ib.port !== undefined && !isValidPort(ib.port))
        errors.push({ msg: `Port must be 1-65535`, path: `${root}.inbound[${i}].port` });
      if (ib.servicePort !== undefined && !isValidPort(ib.servicePort))
        errors.push({ msg: `Service port must be 1-65535`, path: `${root}.inbound[${i}].servicePort` });
      if (!ib.tags || !ib.tags['kuma.io/service'])
        errors.push({ msg: 'Inbound tags must include "kuma.io/service"', path: `${root}.inbound[${i}].tags` });
    });
  }

  // Outbound
  if (Array.isArray(net.outbound)) {
    net.outbound.forEach((ob, i) => {
      if (ob.port !== undefined && !isValidPort(ob.port))
        errors.push({ msg: `Port must be 1-65535`, path: `${root}.outbound[${i}].port` });
      if (ob.tags && ob.backendRef)
        errors.push({ msg: 'tags and backendRef are mutually exclusive', path: `${root}.outbound[${i}]` });
      if (ob.tags && !ob.tags['kuma.io/service'])
        errors.push({ msg: 'Outbound tags must include "kuma.io/service"', path: `${root}.outbound[${i}].tags` });
      if (ob.backendRef) {
        const validKinds = ['MeshService', 'MeshExternalService', 'MeshMultiZoneService'];
        if (ob.backendRef.kind && !validKinds.includes(ob.backendRef.kind))
          errors.push({ msg: `backendRef kind must be one of: ${validKinds.join(', ')}`, path: `${root}.outbound[${i}].backendRef.kind` });
      }
    });
  }
}

function validateExternalService(doc, format, errors, warnings) {
  const net = format === 'uni' ? doc.networking : doc.spec?.networking;
  const tags = format === 'uni' ? doc.tags : doc.spec?.tags;
  const root = format === 'uni' ? '' : 'spec.';

  if (!net?.address)
    errors.push({ msg: 'networking.address is required (HOST:PORT format)', path: `${root}networking.address` });

  if (!tags?.['kuma.io/service'])
    errors.push({ msg: 'Tags must include "kuma.io/service"', path: `${root}tags` });
}

function validateZoneIngress(doc, format, errors, warnings) {
  const net = format === 'uni' ? doc.networking : doc.spec?.networking;
  const root = format === 'uni' ? 'networking' : 'spec.networking';
  if (!net) { errors.push({ msg: 'Missing networking', path: root }); return; }

  if (net.port !== undefined && !isValidPort(net.port))
    errors.push({ msg: 'Port must be 1-65535', path: `${root}.port` });
  if (net.address && !isValidAddress(net.address))
    errors.push({ msg: 'Address must be a valid IP or hostname', path: `${root}.address` });

  const hasAdvAddr = !!net.advertisedAddress;
  const hasAdvPort = net.advertisedPort !== undefined;
  if (hasAdvAddr !== hasAdvPort)
    errors.push({ msg: 'advertisedAddress and advertisedPort must both be set or both empty', path: root });
}

function validateZoneEgress(doc, format, errors, warnings) {
  const net = format === 'uni' ? doc.networking : doc.spec?.networking;
  const root = format === 'uni' ? 'networking' : 'spec.networking';
  if (!net) { errors.push({ msg: 'Missing networking', path: root }); return; }

  if (net.port !== undefined && !isValidPort(net.port))
    errors.push({ msg: 'Port must be 1-65535', path: `${root}.port` });
  if (net.address && !isValidAddress(net.address))
    errors.push({ msg: 'Address must be a valid IP or hostname', path: `${root}.address` });
}

function validateMesh(doc, format, errors, warnings) {
  const spec = format === 'uni' ? doc : doc.spec;
  if (!spec) return;

  if (spec.mtls) {
    if (Array.isArray(spec.mtls.backends) && spec.mtls.backends.length > 1)
      warnings.push({ msg: 'mTLS limited to 1 backend', path: 'spec.mtls.backends' });
    const names = spec.mtls.backends?.map(b => b.name).filter(Boolean) || [];
    if (new Set(names).size !== names.length)
      errors.push({ msg: 'mTLS backend names must be unique', path: 'spec.mtls.backends' });
  }

  if (spec.logging?.backends) {
    const names = spec.logging.backends.map(b => b.name).filter(Boolean);
    if (new Set(names).size !== names.length)
      errors.push({ msg: 'Logging backend names must be unique', path: 'spec.logging.backends' });
  }

  if (spec.tracing?.backends) {
    const names = spec.tracing.backends.map(b => b.name).filter(Boolean);
    if (new Set(names).size !== names.length)
      errors.push({ msg: 'Tracing backend names must be unique', path: 'spec.tracing.backends' });
  }

  if (spec.metrics?.backends) {
    const names = spec.metrics.backends.map(b => b.name).filter(Boolean);
    if (new Set(names).size !== names.length)
      errors.push({ msg: 'Metrics backend names must be unique', path: 'spec.metrics.backends' });
  }
}

function validateMeshGatewayResource(doc, format, errors, warnings) {
  const spec = doc.spec;
  if (!spec) { errors.push({ msg: 'Missing spec', path: 'spec' }); return; }

  if (Array.isArray(spec.listeners)) {
    spec.listeners.forEach((l, i) => {
      if (l.port !== undefined && !isValidPort(l.port))
        errors.push({ msg: 'Port must be 1-65535', path: `spec.listeners[${i}].port` });
      if (l.protocol && !['HTTP', 'HTTPS', 'TCP', 'TLS', 'UDP'].includes(l.protocol))
        errors.push({ msg: `Unknown listener protocol: ${l.protocol}`, path: `spec.listeners[${i}].protocol` });
    });
  }
}

function renderResults(result) {
  const container = document.getElementById('results');
  const badge = document.getElementById('formatBadge');

  if (!result || (result.errors.length === 0 && result.warnings.length === 0 && result.infos.length === 0)) {
    container.innerHTML = '<div class="empty-state"><div class="arrow">&larr;</div><p>Paste a Kuma resource YAML</p><p class="sub">Policies, MeshService, Dataplane, and more</p></div>';
    badge.innerHTML = '';
    return;
  }

  badge.innerHTML = result.format === 'k8s' ? '<span class="badge">K8S</span>'
    : result.format === 'uni' ? '<span class="badge">UNI</span>' : '';

  let html = '';

  if (result.errors.length > 0) {
    html += `<div class="result-section"><h3 class="errors">Errors \u2014 ${result.errors.length}</h3>`;
    result.errors.forEach(e => {
      html += `<div class="result-item error"><span class="icon">&times;</span><div class="msg">${esc(e.msg)}${e.path ? `<span class="path">${esc(e.path)}</span>` : ''}</div></div>`;
    });
    html += '</div>';
  }

  if (result.warnings.length > 0) {
    html += `<div class="result-section"><h3 class="warnings">Warnings \u2014 ${result.warnings.length}</h3>`;
    result.warnings.forEach(w => {
      html += `<div class="result-item warning"><span class="icon">!</span><div class="msg">${esc(w.msg)}${w.path ? `<span class="path">${esc(w.path)}</span>` : ''}</div></div>`;
    });
    html += '</div>';
  }

  if (result.infos.length > 0) {
    const isValid = result.errors.length === 0;
    html += `<div class="result-section"><h3 class="${isValid ? 'valid' : 'info'}">${isValid ? 'Valid' : 'Info'} \u2014 ${result.infos.length}</h3>`;
    result.infos.forEach(i => {
      html += `<div class="result-item ${isValid ? 'success' : 'info'}"><span class="icon">${isValid ? '&#10003;' : 'i'}</span><div class="msg">${esc(i.msg)}${i.path ? `<span class="path">${esc(i.path)}</span>` : ''}</div></div>`;
    });
    html += '</div>';
  }

  container.innerHTML = html;
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

const cm = CodeMirror.fromTextArea(document.getElementById('editor'), {
  mode: 'yaml',
  lineNumbers: true,
  tabSize: 2,
  indentWithTabs: false,
  lineWrapping: true,
  placeholder: 'Paste your Kuma policy YAML here...'
});

let timer;
cm.on('change', () => {
  clearTimeout(timer);
  timer = setTimeout(() => renderResults(validate(cm.getValue())), 300);
});

document.getElementById('examples').addEventListener('change', function() {
  if (this.value && EXAMPLES[this.value]) {
    cm.setValue(EXAMPLES[this.value]);
    renderResults(validate(cm.getValue()));
  }
  this.value = '';
});
</script>
</body>
</html>
