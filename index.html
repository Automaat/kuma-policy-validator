<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kuma Policy Validator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/codemirror@5.65.18/lib/codemirror.min.css">
<script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.18/lib/codemirror.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.18/mode/yaml/yaml.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: #ffffff;
  color: #000000;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ── Header ── */
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 20px 32px;
  border-bottom: 3px solid #000;
}

header h1 {
  font-size: 26px;
  font-weight: 900;
  letter-spacing: -0.03em;
  text-transform: uppercase;
}

.header-actions {
  display: flex;
  align-items: center;
  gap: 10px;
}

select {
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  font-weight: 600;
  padding: 10px 16px;
  border: 2px solid #000;
  border-radius: 0;
  background: #fff;
  color: #000;
  cursor: pointer;
  appearance: none;
  -webkit-appearance: none;
  padding-right: 32px;
  background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='black' stroke-width='2' stroke-linecap='round'/%3E%3C/svg%3E");
  background-repeat: no-repeat;
  background-position: right 12px center;
  text-transform: uppercase;
  letter-spacing: 0.02em;
}

select:hover { background-color: #f5f5f5; }
select:focus { outline: 2px solid #000; outline-offset: -2px; }

/* ── Main layout ── */
.main {
  display: flex;
  height: calc(100vh - 68px);
}

.editor-pane, .results-pane {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.editor-pane { border-right: 3px solid #000; }

.pane-header {
  padding: 12px 20px;
  font-size: 13px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: #999;
  border-bottom: 1px solid #e5e5e5;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

/* ── CodeMirror Editor ── */
.editor-wrap { flex: 1; overflow: hidden; }

.editor-wrap .CodeMirror {
  height: 100%;
  font-family: 'JetBrains Mono', monospace;
  font-size: 15px;
  line-height: 1.7;
  background: #fafafa;
  border: none;
}

.CodeMirror-focused { background: #fff; }
.CodeMirror-gutters { background: #f0f0f0; border-right: 1px solid #e5e5e5; }
.CodeMirror-linenumber { color: #bbb; font-size: 12px; }
.CodeMirror-cursor { border-left-color: #000; }
.CodeMirror-selected { background: #d7e4fc; }

/* YAML syntax colors */
.cm-s-default .cm-atom { color: #0550ae; }
.cm-s-default .cm-number { color: #0550ae; }
.cm-s-default .cm-string { color: #0a3069; }
.cm-s-default .cm-meta { color: #6f42c1; }
.cm-s-default .cm-keyword { color: #cf222e; }
.cm-s-default .cm-variable-2 { color: #953800; }

/* ── Results ── */
.results {
  flex: 1;
  overflow-y: auto;
  padding: 24px;
}

.result-section { margin-bottom: 24px; }

.result-section h3 {
  font-size: 13px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-bottom: 12px;
  padding-bottom: 8px;
  border-bottom: 2px solid #000;
}

.result-section h3.errors { border-color: #e57373; color: #c62828; }
.result-section h3.warnings { border-color: #ffb74d; color: #e65100; }
.result-section h3.info { border-color: #90caf9; color: #1565c0; }
.result-section h3.valid { border-color: #81c784; color: #2e7d32; }

.result-item {
  padding: 14px 18px;
  margin-bottom: 8px;
  font-size: 15px;
  font-weight: 500;
  line-height: 1.5;
  display: flex;
  gap: 12px;
  align-items: flex-start;
  border: 2px solid transparent;
  border-radius: 8px;
}

.result-item .icon {
  flex-shrink: 0;
  width: 22px;
  height: 22px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 800;
  border-radius: 50%;
}

.result-item.error {
  background: #ffebee;
  border-color: #ef9a9a;
  color: #c62828;
}

.result-item.error .icon {
  background: #e57373;
  color: #fff;
}

.result-item.error .path { color: #e57373; }

.result-item.warning {
  background: #fff8e1;
  border-color: #ffe082;
  color: #e65100;
}

.result-item.warning .icon {
  background: #ffb74d;
  color: #fff;
}

.result-item.warning .path { color: #ffb74d; }

.result-item.success {
  background: #e8f5e9;
  border-color: #a5d6a7;
  color: #2e7d32;
}

.result-item.success .icon {
  background: #81c784;
  color: #fff;
}

.result-item.success .path { color: #81c784; }

.result-item.info {
  background: #e3f2fd;
  border-color: #90caf9;
  color: #1565c0;
}

.result-item.info .icon {
  background: #90caf9;
  color: #fff;
}

.result-item.info .path { color: #90caf9; }

.result-item .msg { flex: 1; }

.result-item .path {
  color: #999;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  font-weight: 400;
  display: block;
  margin-top: 4px;
}

/* ── Badge ── */
.badge {
  font-size: 10px;
  font-weight: 800;
  padding: 3px 8px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  border: 2px solid #000;
}

/* ── Empty state ── */
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  text-align: center;
  gap: 4px;
}

.empty-state .arrow {
  font-size: 48px;
  font-weight: 900;
  color: #e5e5e5;
  margin-bottom: 12px;
}

.empty-state p { font-size: 16px; font-weight: 600; color: #bbb; }
.empty-state p.sub { font-size: 14px; font-weight: 500; }

/* ── Responsive ── */
@media (max-width: 768px) {
  .main { flex-direction: column; height: auto; min-height: calc(100vh - 68px); }
  .editor-pane { border-right: none; border-bottom: 3px solid #000; min-height: 40vh; }
  .results-pane { min-height: 40vh; }
  header { flex-wrap: wrap; gap: 8px; padding: 16px 20px; }
  .results { padding: 16px; }
}
</style>
</head>
<body>

<header>
  <h1>Kuma Policy Validator</h1>
  <div class="header-actions">
    <select id="examples">
      <option value="">Load Example</option>
      <option value="valid-k8s">Valid MeshTimeout (K8s)</option>
      <option value="valid-uni">Valid MeshTrafficPermission (Uni)</option>
      <option value="deprecated">Deprecated from field</option>
      <option value="invalid">Invalid Policy</option>
    </select>
  </div>
</header>

<div class="main">
  <div class="editor-pane">
    <div class="pane-header">
      <span>YAML Input</span>
      <span id="formatBadge"></span>
    </div>
    <div class="editor-wrap"><textarea id="editor"></textarea></div>
  </div>
  <div class="results-pane">
    <div class="pane-header">Results</div>
    <div class="results" id="results">
      <div class="empty-state">
        <div class="arrow">&larr;</div>
        <p>Paste a Kuma policy YAML</p>
        <p class="sub">or choose an example above</p>
      </div>
    </div>
  </div>
</div>

<script>
const EXAMPLES = {
  'valid-k8s': `apiVersion: kuma.io/v1alpha1
kind: MeshTimeout
metadata:
  name: timeout-global
  namespace: kuma-system
  labels:
    kuma.io/mesh: default
spec:
  targetRef:
    kind: Mesh
  to:
    - targetRef:
        kind: Mesh
      default:
        connectionTimeout: 5s
        idleTimeout: 30s
        http:
          requestTimeout: 15s
          streamIdleTimeout: 60s`,

  'valid-uni': `type: MeshTrafficPermission
name: allow-all
mesh: default
spec:
  targetRef:
    kind: Mesh
  rules:
    - default:
        action: Allow`,

  'deprecated': `apiVersion: kuma.io/v1alpha1
kind: MeshTimeout
metadata:
  name: timeout-deprecated
  namespace: kuma-system
  labels:
    kuma.io/mesh: default
spec:
  targetRef:
    kind: MeshService
    name: backend
  from:
    - targetRef:
        kind: Mesh
      default:
        connectionTimeout: 5s`,

  'invalid': `apiVersion: kuma.io/v1alpha1
kind: MeshTimeout
metadata:
  name: invalid-timeout
  namespace: kuma-system
spec:
  targetRef:
    kind: Mesh`
};

const KNOWN_POLICIES = [
  'MeshAccessLog', 'MeshCircuitBreaker', 'MeshFaultInjection',
  'MeshHealthCheck', 'MeshHTTPRoute', 'MeshLoadBalancingStrategy',
  'MeshMetric', 'MeshPassthrough', 'MeshProxyPatch', 'MeshRateLimit',
  'MeshRetry', 'MeshTCPRoute', 'MeshTimeout', 'MeshTLS', 'MeshTrace',
  'MeshTrafficPermission'
];

const SPEC_LEVEL_DEFAULT_POLICIES = ['MeshMetric', 'MeshPassthrough', 'MeshTrace'];
const NEEDS_TO = ['MeshRetry'];
const FROM_DEPRECATED_USE_RULES = ['MeshAccessLog', 'MeshCircuitBreaker', 'MeshRateLimit', 'MeshTimeout', 'MeshTLS'];
const FROM_DEPRECATED_USE_RULES_MATCHES = ['MeshTrafficPermission', 'MeshFaultInjection'];

const TARGETREF_KINDS = [
  'Mesh', 'Dataplane', 'MeshSubset', 'MeshService', 'MeshServiceSubset',
  'MeshGateway', 'MeshHTTPRoute', 'MeshExternalService', 'MeshMultiZoneService'
];

const DEPRECATED_TOP_TARGETREF = [
  'MeshService', 'MeshServiceSubset', 'MeshSubset', 'MeshGateway',
  'MeshHTTPRoute', 'MeshExternalService', 'MeshMultiZoneService'
];

function validate(yamlStr) {
  const errors = [];
  const warnings = [];
  const infos = [];

  if (!yamlStr.trim()) return { errors, warnings, infos };

  let doc;
  try {
    doc = jsyaml.load(yamlStr);
  } catch (e) {
    const line = e.mark ? e.mark.line + 1 : '?';
    errors.push({ msg: `YAML syntax error: ${e.reason || e.message}`, path: `line ${line}` });
    return { errors, warnings, infos };
  }

  if (!doc || typeof doc !== 'object') {
    errors.push({ msg: 'Document must be a YAML mapping', path: 'root' });
    return { errors, warnings, infos };
  }

  const isK8s = doc.apiVersion && doc.kind && doc.metadata;
  const isUni = doc.type && doc.name && !doc.apiVersion;
  let format = null;
  let policyKind = null;

  if (isK8s) {
    format = 'k8s';
    policyKind = doc.kind;
    infos.push({ msg: 'Kubernetes format detected', path: 'apiVersion, kind, metadata' });
  } else if (isUni) {
    format = 'uni';
    policyKind = doc.type;
    infos.push({ msg: 'Universal format detected', path: 'type, name' });
  } else {
    errors.push({ msg: 'Unknown format: expected Kubernetes (apiVersion+kind+metadata) or Universal (type+name)', path: 'root' });
    return { errors, warnings, infos };
  }

  if (format === 'k8s' && doc.apiVersion !== 'kuma.io/v1alpha1') {
    errors.push({ msg: `Invalid apiVersion: "${doc.apiVersion}", expected "kuma.io/v1alpha1"`, path: 'apiVersion' });
  }

  if (!KNOWN_POLICIES.includes(policyKind)) {
    errors.push({ msg: `Unknown policy kind: "${policyKind}"`, path: format === 'k8s' ? 'kind' : 'type' });
    return { errors, warnings, infos };
  }

  infos.push({ msg: `Policy: ${policyKind}`, path: format === 'k8s' ? 'kind' : 'type' });

  const spec = doc.spec;
  if (!spec || typeof spec !== 'object') {
    errors.push({ msg: 'Missing or invalid spec', path: 'spec' });
    return { errors, warnings, infos };
  }

  const hasTo = Array.isArray(spec.to) && spec.to.length > 0;
  const hasFrom = Array.isArray(spec.from) && spec.from.length > 0;
  const hasRules = Array.isArray(spec.rules) && spec.rules.length > 0;
  const hasDefault = spec.default && typeof spec.default === 'object';

  if (SPEC_LEVEL_DEFAULT_POLICIES.includes(policyKind)) {
    if (!hasDefault && !hasTo && !hasFrom && !hasRules) {
      errors.push({ msg: `${policyKind} requires "default" at spec level`, path: 'spec.default' });
    }
  } else if (NEEDS_TO.includes(policyKind)) {
    if (!hasTo) errors.push({ msg: `${policyKind} requires "to" field`, path: 'spec.to' });
  } else if (policyKind === 'MeshTimeout') {
    if (!hasTo && !hasRules && !hasFrom) errors.push({ msg: 'MeshTimeout requires "to", "from", or "rules"', path: 'spec' });
    if (hasFrom && hasRules) errors.push({ msg: '"from" and "rules" are mutually exclusive', path: 'spec' });
  } else if (policyKind === 'MeshTrafficPermission') {
    if (!hasFrom && !hasRules) errors.push({ msg: 'MeshTrafficPermission requires "from" or "rules"', path: 'spec' });
  }

  function validateTargetRef(tr, path) {
    if (!tr || typeof tr !== 'object') return;
    const kind = tr.kind;
    if (!kind) { errors.push({ msg: 'targetRef missing "kind"', path }); return; }
    if (!TARGETREF_KINDS.includes(kind)) { errors.push({ msg: `Unknown targetRef kind: "${kind}"`, path: `${path}.kind` }); return; }

    switch (kind) {
      case 'Mesh':
        if (tr.name || tr.labels || tr.tags) warnings.push({ msg: 'Mesh targetRef should not have name, labels, or tags', path });
        break;
      case 'Dataplane':
        if (tr.labels && (tr.name || tr.namespace)) errors.push({ msg: 'Dataplane: labels and name/namespace are mutually exclusive', path });
        break;
      case 'MeshSubset':
        if (!tr.tags || Object.keys(tr.tags).length === 0) errors.push({ msg: 'MeshSubset requires "tags"', path });
        break;
      case 'MeshService':
        if (!tr.name && (!tr.labels || Object.keys(tr.labels).length === 0)) errors.push({ msg: 'MeshService requires "name" or "labels"', path });
        break;
      case 'MeshServiceSubset':
        if (!tr.name) errors.push({ msg: 'MeshServiceSubset requires "name"', path });
        if (!tr.tags || Object.keys(tr.tags).length === 0) errors.push({ msg: 'MeshServiceSubset requires "tags"', path });
        break;
      case 'MeshGateway':
        if (!tr.name && (!tr.labels || Object.keys(tr.labels).length === 0)) errors.push({ msg: 'MeshGateway requires "name" or "labels"', path });
        break;
      case 'MeshHTTPRoute': case 'MeshExternalService': case 'MeshMultiZoneService':
        if (!tr.name && (!tr.labels || Object.keys(tr.labels).length === 0)) errors.push({ msg: `${kind} requires "name" or "labels"`, path });
        break;
    }
  }

  if (spec.targetRef) validateTargetRef(spec.targetRef, 'spec.targetRef');
  if (hasTo) spec.to.forEach((item, i) => { if (item.targetRef) validateTargetRef(item.targetRef, `spec.to[${i}].targetRef`); });
  if (hasFrom) spec.from.forEach((item, i) => { if (item.targetRef) validateTargetRef(item.targetRef, `spec.from[${i}].targetRef`); });
  if (hasRules) spec.rules.forEach((rule, i) => {
    if (Array.isArray(rule.matches)) rule.matches.forEach((match, j) => {
      if (match.targetRef) validateTargetRef(match.targetRef, `spec.rules[${i}].matches[${j}].targetRef`);
    });
  });

  if (spec.targetRef && DEPRECATED_TOP_TARGETREF.includes(spec.targetRef.kind)) {
    warnings.push({ msg: `Top-level targetRef kind "${spec.targetRef.kind}" is deprecated \u2014 use "Mesh" or "Dataplane"`, path: 'spec.targetRef.kind' });
  }

  if (hasFrom && FROM_DEPRECATED_USE_RULES.includes(policyKind)) {
    warnings.push({ msg: `"from" in ${policyKind} is deprecated \u2014 use "rules"`, path: 'spec.from' });
  }

  if (hasFrom && FROM_DEPRECATED_USE_RULES_MATCHES.includes(policyKind)) {
    warnings.push({ msg: `"from" in ${policyKind} is deprecated \u2014 use "rules" with "matches"`, path: 'spec.from' });
  }

  if (policyKind === 'MeshHealthCheck') {
    const checkPanic = (obj, path) => {
      if (obj && obj.healthyPanicThreshold !== undefined)
        warnings.push({ msg: '"healthyPanicThreshold" deprecated \u2014 moved to MeshCircuitBreaker', path });
    };
    if (hasTo) spec.to.forEach((item, i) => checkPanic(item.default, `spec.to[${i}].default`));
    if (hasFrom) spec.from.forEach((item, i) => checkPanic(item.default, `spec.from[${i}].default`));
  }

  if (policyKind === 'MeshLoadBalancingStrategy') {
    const checkLbs = (conf, path) => {
      if (!conf) return;
      const lbType = conf.loadBalancer?.type;
      if (lbType === 'RingHash' || lbType === 'Maglev') {
        const inner = conf.loadBalancer?.[lbType === 'RingHash' ? 'ringHash' : 'maglev'];
        if (inner?.hashPolicies) {
          warnings.push({ msg: `"hashPolicies" inside ${lbType} is deprecated \u2014 use top-level`, path: `${path}.loadBalancer.${lbType.toLowerCase()}.hashPolicies` });
          inner.hashPolicies.forEach((hp, j) => {
            if (hp.type === 'SourceIP') warnings.push({ msg: '"SourceIP" deprecated \u2014 use "Connection"', path: `${path}.loadBalancer.${lbType.toLowerCase()}.hashPolicies[${j}].type` });
          });
        }
      }
      if (Array.isArray(conf.hashPolicies)) {
        conf.hashPolicies.forEach((hp, j) => {
          if (hp.type === 'SourceIP') warnings.push({ msg: '"SourceIP" deprecated \u2014 use "Connection"', path: `${path}.hashPolicies[${j}].type` });
        });
      }
    };
    if (hasTo) spec.to.forEach((item, i) => checkLbs(item.default, `spec.to[${i}].default`));
  }

  if (policyKind === 'MeshRateLimit') {
    const checkStatus = (conf, path) => {
      if (!conf) return;
      const status = conf.http?.onRateLimit?.status;
      if (status !== undefined && status < 400)
        warnings.push({ msg: `HTTP onRateLimit status ${status} < 400 is deprecated`, path: `${path}.http.onRateLimit.status` });
    };
    if (hasTo) spec.to.forEach((item, i) => checkStatus(item.default, `spec.to[${i}].default`));
    if (hasFrom) spec.from.forEach((item, i) => checkStatus(item.default, `spec.from[${i}].default`));
  }

  if (errors.length === 0) infos.push({ msg: 'Policy structure is valid', path: '' });

  return { errors, warnings, infos, format };
}

function renderResults(result) {
  const container = document.getElementById('results');
  const badge = document.getElementById('formatBadge');

  if (!result || (result.errors.length === 0 && result.warnings.length === 0 && result.infos.length === 0)) {
    container.innerHTML = '<div class="empty-state"><div class="arrow">&larr;</div><p>Paste a Kuma policy YAML</p><p class="sub">or choose an example above</p></div>';
    badge.innerHTML = '';
    return;
  }

  badge.innerHTML = result.format === 'k8s' ? '<span class="badge">K8S</span>'
    : result.format === 'uni' ? '<span class="badge">UNI</span>' : '';

  let html = '';

  if (result.errors.length > 0) {
    html += `<div class="result-section"><h3 class="errors">Errors \u2014 ${result.errors.length}</h3>`;
    result.errors.forEach(e => {
      html += `<div class="result-item error"><span class="icon">&times;</span><div class="msg">${esc(e.msg)}${e.path ? `<span class="path">${esc(e.path)}</span>` : ''}</div></div>`;
    });
    html += '</div>';
  }

  if (result.warnings.length > 0) {
    html += `<div class="result-section"><h3 class="warnings">Warnings \u2014 ${result.warnings.length}</h3>`;
    result.warnings.forEach(w => {
      html += `<div class="result-item warning"><span class="icon">!</span><div class="msg">${esc(w.msg)}${w.path ? `<span class="path">${esc(w.path)}</span>` : ''}</div></div>`;
    });
    html += '</div>';
  }

  if (result.infos.length > 0) {
    const isValid = result.errors.length === 0;
    html += `<div class="result-section"><h3 class="${isValid ? 'valid' : 'info'}">${isValid ? 'Valid' : 'Info'} \u2014 ${result.infos.length}</h3>`;
    result.infos.forEach(i => {
      html += `<div class="result-item ${isValid ? 'success' : 'info'}"><span class="icon">${isValid ? '&#10003;' : 'i'}</span><div class="msg">${esc(i.msg)}${i.path ? `<span class="path">${esc(i.path)}</span>` : ''}</div></div>`;
    });
    html += '</div>';
  }

  container.innerHTML = html;
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

const cm = CodeMirror.fromTextArea(document.getElementById('editor'), {
  mode: 'yaml',
  lineNumbers: true,
  tabSize: 2,
  indentWithTabs: false,
  lineWrapping: true,
  placeholder: 'Paste your Kuma policy YAML here...'
});

let timer;
cm.on('change', () => {
  clearTimeout(timer);
  timer = setTimeout(() => renderResults(validate(cm.getValue())), 300);
});

document.getElementById('examples').addEventListener('change', function() {
  if (this.value && EXAMPLES[this.value]) {
    cm.setValue(EXAMPLES[this.value]);
    renderResults(validate(cm.getValue()));
  }
  this.value = '';
});
</script>
</body>
</html>
