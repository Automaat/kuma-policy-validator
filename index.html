<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kuma Resource Validator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/ajv/8.17.1/ajv7.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/codemirror@5.65.18/lib/codemirror.min.css">
<script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.18/lib/codemirror.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.18/mode/yaml/yaml.min.js"></script>
<script src="schemas.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: #ffffff;
  color: #000000;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* -- Header -- */
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 20px 32px;
  border-bottom: 3px solid #000;
}

header h1 {
  font-size: 26px;
  font-weight: 900;
  letter-spacing: -0.03em;
  text-transform: uppercase;
}

.header-actions {
  display: flex;
  align-items: center;
  gap: 10px;
}

select {
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  font-weight: 600;
  padding: 10px 16px;
  border: 2px solid #000;
  border-radius: 0;
  background: #fff;
  color: #000;
  cursor: pointer;
  appearance: none;
  -webkit-appearance: none;
  padding-right: 32px;
  background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='black' stroke-width='2' stroke-linecap='round'/%3E%3C/svg%3E");
  background-repeat: no-repeat;
  background-position: right 12px center;
  text-transform: uppercase;
  letter-spacing: 0.02em;
}

select:hover { background-color: #f5f5f5; }
select:focus { outline: 2px solid #000; outline-offset: -2px; }

/* -- Main layout -- */
.main {
  display: flex;
  height: calc(100vh - 68px);
}

.editor-pane, .results-pane {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.editor-pane { border-right: 3px solid #000; }

.pane-header {
  padding: 12px 20px;
  font-size: 13px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: #999;
  border-bottom: 1px solid #e5e5e5;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

/* -- CodeMirror Editor -- */
.editor-wrap { flex: 1; overflow: hidden; }

.editor-wrap .CodeMirror {
  height: 100%;
  font-family: 'JetBrains Mono', monospace;
  font-size: 15px;
  line-height: 1.7;
  background: #fafafa;
  border: none;
}

.CodeMirror-focused { background: #fff; }
.CodeMirror-gutters { background: #f0f0f0; border-right: 1px solid #e5e5e5; }
.CodeMirror-linenumber { color: #bbb; font-size: 12px; }
.CodeMirror-cursor { border-left-color: #000; }
.CodeMirror-selected { background: #d7e4fc; }

/* YAML syntax colors */
.cm-s-default .cm-atom { color: #0550ae; }
.cm-s-default .cm-number { color: #0550ae; }
.cm-s-default .cm-string { color: #0a3069; }
.cm-s-default .cm-meta { color: #6f42c1; }
.cm-s-default .cm-keyword { color: #cf222e; }
.cm-s-default .cm-variable-2 { color: #953800; }

/* -- Results -- */
.results {
  flex: 1;
  overflow-y: auto;
  padding: 24px;
}

.result-section { margin-bottom: 24px; }

.result-section h3 {
  font-size: 13px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-bottom: 12px;
  padding-bottom: 8px;
  border-bottom: 2px solid #000;
}

.result-section h3.errors { border-color: #e57373; color: #c62828; }
.result-section h3.warnings { border-color: #ffb74d; color: #e65100; }
.result-section h3.info { border-color: #90caf9; color: #1565c0; }
.result-section h3.valid { border-color: #81c784; color: #2e7d32; }

.result-item {
  padding: 14px 18px;
  margin-bottom: 8px;
  font-size: 15px;
  font-weight: 500;
  line-height: 1.5;
  display: flex;
  gap: 12px;
  align-items: flex-start;
  border: 2px solid transparent;
  border-radius: 8px;
}

.result-item .icon {
  flex-shrink: 0;
  width: 22px;
  height: 22px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 800;
  border-radius: 50%;
}

.result-item.error {
  background: #ffebee;
  border-color: #ef9a9a;
  color: #c62828;
}

.result-item.error .icon {
  background: #e57373;
  color: #fff;
}

.result-item.error .path { color: #e57373; }

.result-item.warning {
  background: #fff8e1;
  border-color: #ffe082;
  color: #e65100;
}

.result-item.warning .icon {
  background: #ffb74d;
  color: #fff;
}

.result-item.warning .path { color: #ffb74d; }

.result-item.success {
  background: #e8f5e9;
  border-color: #a5d6a7;
  color: #2e7d32;
}

.result-item.success .icon {
  background: #81c784;
  color: #fff;
}

.result-item.success .path { color: #81c784; }

.result-item.info {
  background: #e3f2fd;
  border-color: #90caf9;
  color: #1565c0;
}

.result-item.info .icon {
  background: #90caf9;
  color: #fff;
}

.result-item.info .path { color: #90caf9; }

.result-item .msg { flex: 1; }

.result-item .path {
  color: #999;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  font-weight: 400;
  display: block;
  margin-top: 4px;
}

/* -- Badge -- */
.badge {
  font-size: 10px;
  font-weight: 800;
  padding: 3px 8px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  border: 2px solid #000;
}

/* -- Empty state -- */
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  text-align: center;
  gap: 4px;
}

.empty-state .arrow {
  font-size: 48px;
  font-weight: 900;
  color: #e5e5e5;
  margin-bottom: 12px;
}

.empty-state p { font-size: 16px; font-weight: 600; color: #bbb; }
.empty-state p.sub { font-size: 14px; font-weight: 500; }

/* -- Responsive -- */
@media (max-width: 768px) {
  .main { flex-direction: column; height: auto; min-height: calc(100vh - 68px); }
  .editor-pane { border-right: none; border-bottom: 3px solid #000; min-height: 40vh; }
  .results-pane { min-height: 40vh; }
  header { flex-wrap: wrap; gap: 8px; padding: 16px 20px; }
  .results { padding: 16px; }
}
</style>
</head>
<body>

<header>
  <h1>Kuma Resource Validator</h1>
  <div class="header-actions">
    <select id="examples">
      <option value="">Load Example</option>
      <optgroup label="Policies">
        <option value="valid-k8s">Valid MeshTimeout (K8s)</option>
        <option value="valid-uni">Valid MeshTrafficPermission (Uni)</option>
        <option value="deprecated">Deprecated from field</option>
        <option value="invalid-policy">Invalid Policy</option>
      </optgroup>
      <optgroup label="Core Resources">
        <option value="meshservice">MeshService</option>
        <option value="meshexternalservice">MeshExternalService</option>
        <option value="meshmultizoneservice">MeshMultiZoneService</option>
        <option value="dataplane">Dataplane</option>
        <option value="invalid-meshext">Invalid MeshExternalService</option>
        <option value="invalid-dataplane">Invalid Dataplane</option>
        <option value="invalid-mzs">Invalid MeshMultiZoneService</option>
        <option value="invalid-meshsvc">Invalid MeshService</option>
      </optgroup>
    </select>
  </div>
</header>

<div class="main">
  <div class="editor-pane">
    <div class="pane-header">
      <span>YAML Input</span>
      <span id="formatBadge"></span>
    </div>
    <div class="editor-wrap"><textarea id="editor"></textarea></div>
  </div>
  <div class="results-pane">
    <div class="pane-header">Results</div>
    <div class="results" id="results">
      <div class="empty-state">
        <div class="arrow">&larr;</div>
        <p>Paste a Kuma resource YAML</p>
        <p class="sub">policies, MeshService, Dataplane, and more</p>
      </div>
    </div>
  </div>
</div>

<script>
// SCHEMAS loaded via <script src="schemas.js">

const EXAMPLES = {
  'valid-k8s': `apiVersion: kuma.io/v1alpha1
kind: MeshTimeout
metadata:
  name: timeout-global
  namespace: kuma-system
  labels:
    kuma.io/mesh: default
spec:
  targetRef:
    kind: Mesh
  to:
    - targetRef:
        kind: Mesh
      default:
        connectionTimeout: 5s
        idleTimeout: 30s
        http:
          requestTimeout: 15s
          streamIdleTimeout: 60s`,

  'valid-uni': `type: MeshTrafficPermission
name: allow-all
mesh: default
spec:
  targetRef:
    kind: Mesh
  rules:
    - default:
        action: Allow`,

  'deprecated': `apiVersion: kuma.io/v1alpha1
kind: MeshTimeout
metadata:
  name: timeout-deprecated
  namespace: kuma-system
  labels:
    kuma.io/mesh: default
spec:
  targetRef:
    kind: MeshService
    name: backend
  from:
    - targetRef:
        kind: Mesh
      default:
        connectionTimeout: 5s`,

  'invalid-policy': `apiVersion: kuma.io/v1alpha1
kind: MeshTimeout
metadata:
  name: invalid-timeout
  namespace: kuma-system
spec:
  targetRef:
    kind: Mesh`,

  'meshservice': `apiVersion: kuma.io/v1alpha1
kind: MeshService
metadata:
  name: backend
  namespace: kuma-demo
  labels:
    kuma.io/mesh: default
spec:
  selector:
    dataplaneTags:
      app: backend
  ports:
    - port: 80
      targetPort: 8080
      appProtocol: http`,

  'meshexternalservice': `apiVersion: kuma.io/v1alpha1
kind: MeshExternalService
metadata:
  name: external-api
  namespace: kuma-system
  labels:
    kuma.io/mesh: default
spec:
  match:
    type: HostnameGenerator
    port: 443
    protocol: tcp
  endpoints:
    - address: api.example.com
      port: 443
  tls:
    enabled: true
    verification:
      mode: Secured
      serverName: api.example.com`,

  'meshmultizoneservice': `apiVersion: kuma.io/v1alpha1
kind: MeshMultiZoneService
metadata:
  name: backend-global
  namespace: kuma-system
  labels:
    kuma.io/mesh: default
spec:
  selector:
    meshService:
      matchLabels:
        app: backend
  ports:
    - port: 80
      appProtocol: http`,

  'dataplane': `type: Dataplane
name: backend-01
mesh: default
networking:
  address: 192.168.0.1
  inbound:
    - port: 8080
      servicePort: 80
      tags:
        kuma.io/service: backend
        kuma.io/protocol: http`,

  'invalid-meshext': `apiVersion: kuma.io/v1alpha1
kind: MeshExternalService
metadata:
  name: bad-external
  namespace: kuma-system
  labels:
    kuma.io/mesh: default
spec:
  match:
    port: 0
    protocol: websocket
  endpoints:
    - address: "not a valid address!"
      port: 99999`,

  'invalid-dataplane': `type: Dataplane
name: broken-dp
mesh: default
networking:
  address: 0.0.0.0
  inbound:
    - port: 70000
      tags:
        app: backend
  outbound:
    - port: 8080
      tags:
        app: redis
      backendRef:
        kind: MeshService
        name: redis`,

  'invalid-mzs': `apiVersion: kuma.io/v1alpha1
kind: MeshMultiZoneService
metadata:
  name: bad-mzs
  namespace: kuma-system
  labels:
    kuma.io/mesh: default
spec:
  selector:
    meshService:
      matchLabels: {}
  ports: []`,

  'invalid-meshsvc': `apiVersion: kuma.io/v1alpha1
kind: MeshService
metadata:
  name: this-name-is-way-too-long-and-exceeds-the-sixty-three-character-limit-for-mesh-services
  namespace: kuma-demo
  labels:
    kuma.io/mesh: default
spec:
  selector:
    dataplaneTags:
      app: backend
    dataplaneLabels:
      env: prod
  ports:
    - port: 0
      appProtocol: websocket`
};

// -- Deprecation constants (not captured by schema) --
const FROM_DEPRECATED_USE_RULES = ['MeshAccessLog', 'MeshCircuitBreaker', 'MeshRateLimit', 'MeshTimeout', 'MeshTLS'];
const FROM_DEPRECATED_USE_RULES_MATCHES = ['MeshTrafficPermission', 'MeshFaultInjection'];
const DEPRECATED_TOP_TARGETREF = [
  'MeshService', 'MeshServiceSubset', 'MeshSubset', 'MeshGateway',
  'MeshHTTPRoute', 'MeshExternalService', 'MeshMultiZoneService'
];

// -- Ajv schema validation --
function validateWithSchema(kind, spec) {
  const schema = SCHEMAS[kind];
  if (!schema) return [];

  const ajv = new ajv7({ allErrors: true, strict: false });
  const valid = ajv.validate(schema, spec);
  if (valid) return [];

  return ajv.errors.map(err => {
    const path = err.instancePath
      ? 'spec' + err.instancePath.replace(/\//g, '.')
      : 'spec';

    let msg;
    switch (err.keyword) {
      case 'required':
        msg = `Missing required property "${err.params.missingProperty}"`;
        break;
      case 'additionalProperties':
        msg = `Unknown property "${err.params.additionalProperty}"`;
        break;
      case 'type':
        msg = `Must be ${err.params.type}`;
        break;
      case 'enum':
        msg = `Must be one of: ${err.params.allowedValues.join(', ')}`;
        break;
      case 'minimum':
        msg = `Must be >= ${err.params.limit}`;
        break;
      case 'maximum':
        msg = `Must be <= ${err.params.limit}`;
        break;
      case 'minItems':
        msg = `Must have at least ${err.params.limit} item(s)`;
        break;
      case 'maxLength':
        msg = `Must be at most ${err.params.limit} characters`;
        break;
      case 'minLength':
        msg = `Must be at least ${err.params.limit} character(s)`;
        break;
      case 'pattern':
        msg = `Does not match required pattern: ${err.params.pattern}`;
        break;
      case 'oneOf':
        msg = `Must match exactly one schema`;
        break;
      case 'anyOf':
        msg = `Must match at least one schema`;
        break;
      default:
        msg = err.message || `Validation failed: ${err.keyword}`;
    }

    return { msg, path };
  });
}

// -- Deprecation checks --
function checkDeprecations(kind, spec) {
  const warnings = [];
  const hasFrom = Array.isArray(spec.from) && spec.from.length > 0;
  const hasTo = Array.isArray(spec.to) && spec.to.length > 0;

  if (spec.targetRef && DEPRECATED_TOP_TARGETREF.includes(spec.targetRef.kind))
    warnings.push({ msg: `Top-level targetRef kind "${spec.targetRef.kind}" is deprecated \u2014 use "Mesh" or "Dataplane"`, path: 'spec.targetRef.kind' });

  if (hasFrom && FROM_DEPRECATED_USE_RULES.includes(kind))
    warnings.push({ msg: `"from" in ${kind} is deprecated \u2014 use "rules"`, path: 'spec.from' });

  if (hasFrom && FROM_DEPRECATED_USE_RULES_MATCHES.includes(kind))
    warnings.push({ msg: `"from" in ${kind} is deprecated \u2014 use "rules" with "matches"`, path: 'spec.from' });

  if (kind === 'MeshHealthCheck') {
    const checkPanic = (obj, p) => {
      if (obj && obj.healthyPanicThreshold !== undefined)
        warnings.push({ msg: '"healthyPanicThreshold" deprecated \u2014 moved to MeshCircuitBreaker', path: p });
    };
    if (hasTo) spec.to.forEach((item, i) => checkPanic(item.default, `spec.to[${i}].default`));
    if (hasFrom) spec.from.forEach((item, i) => checkPanic(item.default, `spec.from[${i}].default`));
  }

  if (kind === 'MeshLoadBalancingStrategy') {
    const checkLbs = (conf, p) => {
      if (!conf) return;
      const lbType = conf.loadBalancer?.type;
      if (lbType === 'RingHash' || lbType === 'Maglev') {
        const inner = conf.loadBalancer?.[lbType === 'RingHash' ? 'ringHash' : 'maglev'];
        if (inner?.hashPolicies) {
          warnings.push({ msg: `"hashPolicies" inside ${lbType} is deprecated \u2014 use top-level`, path: `${p}.loadBalancer.${lbType.toLowerCase()}.hashPolicies` });
          inner.hashPolicies.forEach((hp, j) => {
            if (hp.type === 'SourceIP') warnings.push({ msg: '"SourceIP" deprecated \u2014 use "Connection"', path: `${p}.loadBalancer.${lbType.toLowerCase()}.hashPolicies[${j}].type` });
          });
        }
      }
      if (Array.isArray(conf.hashPolicies)) {
        conf.hashPolicies.forEach((hp, j) => {
          if (hp.type === 'SourceIP') warnings.push({ msg: '"SourceIP" deprecated \u2014 use "Connection"', path: `${p}.hashPolicies[${j}].type` });
        });
      }
    };
    if (hasTo) spec.to.forEach((item, i) => checkLbs(item.default, `spec.to[${i}].default`));
  }

  if (kind === 'MeshRateLimit') {
    const checkStatus = (conf, p) => {
      if (!conf) return;
      const status = conf.http?.onRateLimit?.status;
      if (status !== undefined && status < 400)
        warnings.push({ msg: `HTTP onRateLimit status ${status} < 400 is deprecated`, path: `${p}.http.onRateLimit.status` });
    };
    if (hasTo) spec.to.forEach((item, i) => checkStatus(item.default, `spec.to[${i}].default`));
    if (hasFrom) spec.from.forEach((item, i) => checkStatus(item.default, `spec.from[${i}].default`));
  }

  return warnings;
}

// -- Main validate function --
function validate(yamlStr) {
  const errors = [];
  const warnings = [];
  const infos = [];

  if (!yamlStr.trim()) return { errors, warnings, infos };

  let doc;
  try {
    doc = jsyaml.load(yamlStr);
  } catch (e) {
    const line = e.mark ? e.mark.line + 1 : '?';
    errors.push({ msg: `YAML syntax error: ${e.reason || e.message}`, path: `line ${line}` });
    return { errors, warnings, infos };
  }

  if (!doc || typeof doc !== 'object') {
    errors.push({ msg: 'Document must be a YAML mapping', path: 'root' });
    return { errors, warnings, infos };
  }

  // Detect format
  const isK8s = doc.apiVersion && doc.kind && doc.metadata;
  const isUni = doc.type && doc.name && !doc.apiVersion;
  let format = null;
  let kind = null;

  if (isK8s) {
    format = 'k8s';
    kind = doc.kind;
    infos.push({ msg: 'Kubernetes format detected', path: 'apiVersion, kind, metadata' });
  } else if (isUni) {
    format = 'uni';
    kind = doc.type;
    infos.push({ msg: 'Universal format detected', path: 'type, name' });
  } else {
    errors.push({ msg: 'Unknown format: expected Kubernetes (apiVersion+kind+metadata) or Universal (type+name)', path: 'root' });
    return { errors, warnings, infos };
  }

  if (format === 'k8s' && doc.apiVersion !== 'kuma.io/v1alpha1') {
    errors.push({ msg: `Invalid apiVersion: "${doc.apiVersion}", expected "kuma.io/v1alpha1"`, path: 'apiVersion' });
  }

  // Check if we have a schema for this kind
  const hasSchema = SCHEMAS[kind];

  if (!hasSchema) {
    warnings.push({ msg: `No schema available for "${kind}" \u2014 structural validation skipped`, path: format === 'k8s' ? 'kind' : 'type' });
    return { errors, warnings, infos, format };
  }

  infos.push({ msg: `Resource: ${kind}`, path: format === 'k8s' ? 'kind' : 'type' });

  // Get spec (policies and most K8s resources use doc.spec; universal Dataplane uses doc directly)
  const spec = doc.spec;
  if (!spec || typeof spec !== 'object') {
    errors.push({ msg: 'Missing or invalid spec', path: 'spec' });
    return { errors, warnings, infos, format };
  }

  // Schema validation with Ajv
  const schemaErrors = validateWithSchema(kind, spec);
  schemaErrors.forEach(e => errors.push(e));

  // Policy structural checks (schemas lack required fields for these)
  const schemaProps = Object.keys(SCHEMAS[kind].properties || {});
  const policySections = ['to', 'from', 'rules', 'default'].filter(s => schemaProps.includes(s));
  if (policySections.length > 0) {
    if (!spec.targetRef)
      errors.push({ msg: 'spec.targetRef is required', path: 'spec.targetRef' });
    const hasAny = policySections.some(s => {
      const v = spec[s];
      return Array.isArray(v) ? v.length > 0 : v && typeof v === 'object';
    });
    if (!hasAny)
      errors.push({ msg: `Requires at least one of: ${policySections.map(s => '"' + s + '"').join(', ')}`, path: 'spec' });
  }

  // Deprecation checks
  const deprecations = checkDeprecations(kind, spec);
  deprecations.forEach(w => warnings.push(w));

  if (errors.length === 0) infos.push({ msg: 'Resource structure is valid', path: '' });

  return { errors, warnings, infos, format };
}

function renderResults(result) {
  const container = document.getElementById('results');
  const badge = document.getElementById('formatBadge');

  if (!result || (result.errors.length === 0 && result.warnings.length === 0 && result.infos.length === 0)) {
    container.innerHTML = '<div class="empty-state"><div class="arrow">&larr;</div><p>Paste a Kuma resource YAML</p><p class="sub">Policies, MeshService, Dataplane, and more</p></div>';
    badge.innerHTML = '';
    return;
  }

  badge.innerHTML = result.format === 'k8s' ? '<span class="badge">K8S</span>'
    : result.format === 'uni' ? '<span class="badge">UNI</span>' : '';

  let html = '';

  if (result.errors.length > 0) {
    html += `<div class="result-section"><h3 class="errors">Errors \u2014 ${result.errors.length}</h3>`;
    result.errors.forEach(e => {
      html += `<div class="result-item error"><span class="icon">&times;</span><div class="msg">${esc(e.msg)}${e.path ? `<span class="path">${esc(e.path)}</span>` : ''}</div></div>`;
    });
    html += '</div>';
  }

  if (result.warnings.length > 0) {
    html += `<div class="result-section"><h3 class="warnings">Warnings \u2014 ${result.warnings.length}</h3>`;
    result.warnings.forEach(w => {
      html += `<div class="result-item warning"><span class="icon">!</span><div class="msg">${esc(w.msg)}${w.path ? `<span class="path">${esc(w.path)}</span>` : ''}</div></div>`;
    });
    html += '</div>';
  }

  if (result.infos.length > 0) {
    const isValid = result.errors.length === 0;
    html += `<div class="result-section"><h3 class="${isValid ? 'valid' : 'info'}">${isValid ? 'Valid' : 'Info'} \u2014 ${result.infos.length}</h3>`;
    result.infos.forEach(i => {
      html += `<div class="result-item ${isValid ? 'success' : 'info'}"><span class="icon">${isValid ? '&#10003;' : 'i'}</span><div class="msg">${esc(i.msg)}${i.path ? `<span class="path">${esc(i.path)}</span>` : ''}</div></div>`;
    });
    html += '</div>';
  }

  container.innerHTML = html;
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

const cm = CodeMirror.fromTextArea(document.getElementById('editor'), {
  mode: 'yaml',
  lineNumbers: true,
  tabSize: 2,
  indentWithTabs: false,
  lineWrapping: true,
  placeholder: 'Paste your Kuma policy YAML here...'
});

let timer;
cm.on('change', () => {
  clearTimeout(timer);
  timer = setTimeout(() => renderResults(validate(cm.getValue())), 300);
});

document.getElementById('examples').addEventListener('change', function() {
  if (this.value && EXAMPLES[this.value]) {
    cm.setValue(EXAMPLES[this.value]);
    renderResults(validate(cm.getValue()));
  }
  this.value = '';
});
</script>
</body>
</html>
